name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT || '22' }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.VPS_PORT || '22' }}" \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='.env' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/ter-net-in/

      - name: Restart
        run: |
          ssh -p ${{ secrets.VPS_PORT || '22' }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ~/ter-net-in && docker compose up -d --build"
